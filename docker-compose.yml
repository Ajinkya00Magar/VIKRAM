
# ============================================================
# PS13 — AIR-GAPPED PREDICTIVE COPILOT
# Full System Docker Compose
# Run: docker-compose up --build
# ============================================================

networks:
  ps13-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  influxdb_data:
  influxdb_config:
  chroma_data:
  ollama_models:
  prometheus_data:
  grafana_data:

services:

  # ──────────────────────────────────────────
  # INFRASTRUCTURE LAYER
  # ──────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ps13-postgres
    restart: unless-stopped
    networks:
      - ps13-net
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ps13_db}
      POSTGRES_USER: ${POSTGRES_USER:-ps13_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ps13secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/schemas/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ps13_user} -d ${POSTGRES_DB:-ps13_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    container_name: ps13-influxdb
    restart: unless-stopped
    networks:
      - ps13-net
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-influxadmin}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-ps13}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-network_telemetry}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-ps13-influx-token-dev}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: ps13-chromadb
    restart: unless-stopped
    networks:
      - ps13-net
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8100:8000"
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ps13-ollama
    restart: unless-stopped
    networks:
      - ps13-net
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    # GPU support (uncomment if NVIDIA GPU available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 15s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: ps13-prometheus
    restart: unless-stopped
    networks:
      - ps13-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: ps13-grafana
    restart: unless-stopped
    networks:
      - ps13-net
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  telegraf:
    image: telegraf:latest
    container_name: ps13-telegraf
    restart: unless-stopped
    networks:
      - ps13-net

    environment:
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      SNMP_COMMUNITY: ${SNMP_COMMUNITY}

    volumes:
      - ./infra/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro

    depends_on:
      - influxdb
    # <<EXPORTER_CONFIGURATION_REQUIRED>>
    # Telegraf needs network device SNMP access configured

  # ──────────────────────────────────────────
  # APPLICATION LAYER
  # ──────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ps13-backend
    restart: unless-stopped
    networks:
      - ps13-net
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ps13_user}:${POSTGRES_PASSWORD:-ps13secret}@postgres:5432/${POSTGRES_DB:-ps13_db}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-ps13-influx-token-dev}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-ps13}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-network_telemetry}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-ps13_knowledge}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b-instruct}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
      AIR_GAPPED: "true"
      PYTHONWARNINGS: "ignore"
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ps13-frontend
    restart: unless-stopped
    networks:
      - ps13-net
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_APP_NAME: "VIKRAM"
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ──────────────────────────────────────────
  # INITIALIZATION
  # ──────────────────────────────────────────

  init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ps13-init
    networks:
      - ps13-net
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ps13_user}:${POSTGRES_PASSWORD:-ps13secret}@postgres:5432/${POSTGRES_DB:-ps13_db}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-ps13-influx-token-dev}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-ps13}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-network_telemetry}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b-instruct}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
    volumes:
      - ./data:/app/data
    command: python /app/data/generate_demo_data.py
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    restart: "no"
