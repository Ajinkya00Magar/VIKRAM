global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ps13-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: "influxdb"
    static_configs:
      - targets: ["influxdb:8086"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

