# ── Input: NetFlow / IPFIX ─────────────────────────────────
[[inputs.netflow]]
  service_address = "udp://:9995"
  protocol = "ipfix"

# ── Input: Syslog ──────────────────────────────────────────
[[inputs.syslog]]
  server = "udp://:514"

# ── Input: Internal Metrics ────────────────────────────────
[[inputs.internal]]
  collect_memstats = false
