# ============================================================
# PS13 Telegraf Configuration
# Telemetry pipeline: SNMP + Syslog + NetFlow → InfluxDB
# <<EXPORTER_CONFIGURATION_REQUIRED>>
# Replace placeholder IPs with real device addresses
# ============================================================

[global_tags]
  environment = "ps13-airgapped"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

# ── Output: InfluxDB ──────────────────────────────────────
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"

